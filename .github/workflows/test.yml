name: Tests

on:
  pull_request:
  push:
    branches: [main, dashboard-improvements]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-buddy-dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: baby-buddy-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baby-buddy-dashboard/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: baby-buddy-dashboard/backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q
