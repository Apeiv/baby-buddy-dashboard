configuration:
  baby_buddy_url:
    name: Baby Buddy URL
    description: "Full URL to your Baby Buddy instance (e.g., https://babybuddy.example.com)"
  baby_buddy_api_key:
    name: API Key
    description: "Baby Buddy API token (found in Baby Buddy under Settings > API Key)"
  refresh_interval:
    name: Refresh Interval
    description: "How often (in seconds) the dashboard polls for new data"
  demo_mode:
    name: Demo Mode
    description: "Show mock data without connecting to a Baby Buddy instance"
  unit_system:
    name: Unit System
    description: "Unit labels for measurements (metric: kg, cm, mL, °C — imperial: lb, in, oz, °F)"
  enable_medication_alerts:
    name: Medication Alerts
    description: "Expose a binary_sensor.baby_buddy_medication_overdue entity in Home Assistant that turns on when any medication dose is overdue, so you can build your own automations/notifications on top of it"
  child_sex:
    name: Child's Sex
    description: "Optional - lets the Growth tab overlay WHO growth-standard percentile curves (weight, height, head circumference, BMI) on top of your child's own measurements. Baby Buddy itself doesn't store this, so it's set here instead. Leave unset to hide the percentile overlay."
